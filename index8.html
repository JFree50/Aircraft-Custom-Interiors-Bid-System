<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aircraft Custom Interiors — Bid System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0f0f;color:#f0f0f0;font-family:'Syne',sans-serif;min-height:100vh;}
.shell{display:flex;min-height:100vh;}
.sidebar{width:200px;background:#161616;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:20px;border-bottom:1px solid #2a2a2a;}
.logo-mark{font-size:11px;letter-spacing:.15em;color:#c8a96e;text-transform:uppercase;font-weight:600;}
.logo-name{font-size:15px;font-weight:700;}
nav{padding:12px;flex:1;}
.nav-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#999;background:none;border:none;width:100%;text-align:left;font-family:'Syne',sans-serif;margin-bottom:2px;}
.nav-btn:hover{background:#1e1e1e;color:#f0f0f0;}
.nav-btn.active{background:#252525;color:#c8a96e;}
.sidebar-footer{padding:14px;border-top:1px solid #2a2a2a;font-size:11px;color:#555;display:flex;align-items:center;gap:6px;}
.dot{width:6px;height:6px;border-radius:50%;background:#555;flex-shrink:0;}
.dot.ok{background:#4caf7d;}
.dot.err{background:#e05555;}
.dot.loading{background:#e6a817;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{flex:1;overflow-y:auto;padding:32px 36px;max-width:960px;}
.page{display:none;}
.page.on{display:block;}
h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.sub{font-size:13px;color:#999;margin-bottom:24px;}
.card{background:#161616;border:1px solid #2a2a2a;border-radius:12px;padding:20px;margin-bottom:16px;}
.card-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#555;font-weight:600;margin-bottom:14px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#999;font-weight:600;}
input,select,textarea{background:#1e1e1e;border:1px solid #333;border-radius:8px;color:#f0f0f0;font-family:'Syne',sans-serif;font-size:14px;padding:9px 12px;width:100%;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#c8a96e;}
textarea{resize:vertical;min-height:60px;}
input::placeholder,textarea::placeholder{color:#555;}
.btn{padding:8px 18px;border-radius:8px;border:1px solid #333;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#f0f0f0;font-family:'Syne',sans-serif;}
.btn:hover{background:#1e1e1e;}
.btn-gold{background:#c8a96e;border-color:#c8a96e;color:#0f0f0f;}
.btn-gold:hover{background:#a88848;border-color:#a88848;}
.btn-red{color:#e05555;border-color:#e05555;}
.btn-row{display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap;}
.save-msg{font-size:13px;margin-left:auto;}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.metric{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:14px 16px;}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#555;margin-bottom:6px;font-weight:600;}
.metric-value{font-size:22px;font-weight:700;}
.plane-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.pcard{background:#161616;border:1px solid #2a2a2a;border-radius:12px;padding:18px;cursor:pointer;transition:border-color .15s;}
.pcard:hover{border-color:#c8a96e;}
.pcard-title{font-size:15px;font-weight:700;margin-bottom:6px;}
.pcard-sub{font-size:12px;color:#999;margin-bottom:10px;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{font-size:10px;padding:3px 8px;border-radius:99px;background:rgba(200,169,110,.12);color:#c8a96e;font-weight:600;border:1px solid rgba(200,169,110,.2);}
.back-btn{background:none;border:none;cursor:pointer;color:#999;font-size:13px;font-family:'Syne',sans-serif;font-weight:600;padding:0;margin-bottom:20px;display:flex;align-items:center;gap:6px;}
.back-btn:hover{color:#c8a96e;}
.part-section{border:1px solid #2a2a2a;border-radius:12px;margin-bottom:12px;overflow:hidden;}
.part-title-bar{padding:12px 16px;background:#1e1e1e;display:flex;justify-content:space-between;align-items:center;}
.part-title-bar h3{font-size:14px;font-weight:600;}
.part-title-bar span{font-size:12px;color:#999;}
.part-content{padding:16px;}
table{width:100%;border-collapse:collapse;margin-bottom:12px;}
th{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#555;font-weight:600;padding:6px 8px;text-align:left;border-bottom:1px solid #2a2a2a;}
td{font-size:13px;padding:8px;border-bottom:1px solid #1e1e1e;color:#f0f0f0;}
td:nth-child(2),td:nth-child(3),td:nth-child(4){font-family:'DM Mono',monospace;font-size:12px;}
tr:last-child td{border-bottom:none;}
.totals{display:flex;gap:20px;flex-wrap:wrap;padding:10px 0 2px;border-top:1px solid #2a2a2a;font-size:13px;}
.tot .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:3px;font-weight:600;}
.tot .val{font-weight:700;font-family:'DM Mono',monospace;}
.tot .val.gold{color:#c8a96e;}
.warn{background:rgba(230,168,23,.08);border:1px solid rgba(230,168,23,.25);border-radius:8px;padding:8px 12px;font-size:12px;color:#e6a817;margin-bottom:12px;}
.search-wrap{position:relative;margin-bottom:20px;}
.search-wrap input{padding-left:16px;}
.empty{text-align:center;padding:48px 20px;color:#555;font-size:14px;}
.part-entry{background:#1e1e1e;border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:12px;}
.mat-heads{display:grid;grid-template-columns:2fr 80px 100px 100px 28px;gap:8px;margin-bottom:6px;}
.mat-heads span{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#555;font-weight:600;padding:0 12px;}
.mat-row-input{display:grid;grid-template-columns:2fr 80px 100px 100px 28px;gap:8px;margin-bottom:6px;align-items:center;}
.mat-row-input input{margin:0;}
.rm-btn{background:none;border:none;cursor:pointer;color:#555;font-size:18px;padding:0;line-height:1;}
.rm-btn:hover{color:#e05555;}
.add-mat{background:none;border:1px dashed #333;border-radius:8px;cursor:pointer;color:#999;font-size:12px;padding:6px 12px;width:100%;font-family:'Syne',sans-serif;font-weight:600;margin-top:4px;}
.add-mat:hover{border-color:#c8a96e;color:#c8a96e;}
.quick-sel{background:#1e1e1e;border:1px solid #c8a96e;border-radius:8px;color:#c8a96e;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer;width:auto;}
.part-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.section-lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#555;font-weight:600;}
@media(max-width:700px){.sidebar{width:56px;}.logo-name,.logo-mark,.nav-btn span,.sidebar-footer span{display:none;}.nav-btn{justify-content:center;padding:12px;}.main{padding:20px 14px;}.frow{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="shell">
<nav class="sidebar">
  <div class="logo"><div class="logo-mark">ACI</div><div class="logo-name">Bid System</div></div>
  <div style="padding:12px;flex:1;">
    <button class="nav-btn active" onclick="nav('lookup')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>Look Up</span></button>
    <button class="nav-btn" onclick="nav('enter')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg><span>Enter Bid</span></button>
    <button class="nav-btn" onclick="nav('all')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>All Planes</span></button>
    <button class="nav-btn" onclick="nav('settings')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Settings</span></button>
  </div>
  <div class="sidebar-footer"><div class="dot loading" id="dot"></div><span id="gh-lbl">Connecting…</span></div>
</nav>

<main class="main">

<!-- LOOK UP -->
<div class="page on" id="page-lookup">
  <div id="view-search">
    <h1>Look Up</h1>
    <div class="sub">Search by plane model or part name</div>
    <div class="search-wrap"><input type="text" id="lu-q" placeholder="Challenger 604, seats, carpet…" oninput="renderSearch()"/></div>
    <div id="search-results"></div>
  </div>
  <div id="view-detail" style="display:none;"></div>
</div>

<!-- ENTER BID -->
<div class="page" id="page-enter">
  <h1>Enter Bid Data</h1>
  <div class="sub">Log a past job — parts, materials, labor</div>
  <div class="card">
    <div class="card-label">Plane & Job Info</div>
    <div class="frow">
      <div class="field"><label>Plane Model *</label><input id="e-model" placeholder="Challenger 604, Gulfstream G550…"/></div>
      <div class="field"><label>Job Date *</label><input id="e-date" type="date"/></div>
    </div>
    <div class="frow">
      <div class="field"><label>Tail Number</label><input id="e-tail" placeholder="N12345"/></div>
      <div class="field"><label>Labor Rate ($/hr)</label><input id="e-rate" type="number" placeholder="90"/></div>
    </div>
    <div class="field"><label>Notes — Flag Outdated Info</label><textarea id="e-notes" placeholder="Labor rate has changed. Material costs from 2022…"></textarea></div>
  </div>
  <div class="part-toolbar">
    <div class="section-lbl">Parts Worked On</div>
    <select class="quick-sel" id="quick-add" onchange="quickAdd(this)">
      <option value="">+ Quick Add Part</option>
      <option>Seats</option><option>Divan</option><option>Headliner</option>
      <option>Side Panels</option><option>Closet</option><option>Carpet</option>
      <option>Bulkhead</option><option>Galley</option><option>Window Reveals</option>
      <option>Armrests</option><option>Cabinet</option><option>Lavatory</option>
      <option>Floor Panels</option><option>Crew Seat</option><option>Custom…</option>
    </select>
  </div>
  <div id="parts-container"></div>
  <div class="btn-row">
    <button class="btn btn-gold" onclick="saveJob()">Save to GitHub</button>
    <button class="btn" onclick="clearForm()">Clear</button>
    <span class="save-msg" id="save-msg"></span>
  </div>
</div>

<!-- ALL PLANES -->
<div class="page" id="page-all">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;">
    <div><h1>All Planes</h1><div class="sub">Every aircraft in your repo</div></div>
    <button class="btn" onclick="loadGH()">↺ Refresh</button>
  </div>
  <div id="all-list"></div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <h1>Settings</h1>
  <div class="sub">GitHub connection</div>
  <div class="card">
    <div class="card-label">GitHub</div>
    <div class="frow">
      <div class="field"><label>Username</label><input id="s-user" placeholder="JFree50"/></div>
      <div class="field"><label>Repository Name</label><input id="s-repo" placeholder="Aircraft-Custom-Interiors-Bid-System"/></div>
    </div>
    <div class="field" style="margin-bottom:16px;"><label>Personal Access Token</label><input id="s-token" type="password" placeholder="ghp_…"/></div>
    <div class="btn-row">
      <button class="btn btn-gold" onclick="saveSettings()">Save & Reconnect</button>
      <button class="btn" onclick="loadGH()">Test Connection</button>
    </div>
  </div>
</div>

</main>
</div>

<script>
const CONF='aci_v4';
const FILE='bid_data.json';
let data={};
let cfg={};
let pc=0;

function lc(){try{return JSON.parse(localStorage.getItem(CONF)||'{}')}catch{return {}}}
function sc(c){localStorage.setItem(CONF,JSON.stringify(c))}
function apiUrl(){return `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${FILE}`}
function hdrs(){return{'Authorization':'token '+cfg.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'}}

function setStatus(type,msg){
  const d=document.getElementById('dot');
  const l=document.getElementById('gh-lbl');
  d.className='dot '+type;
  l.textContent=msg;
}

async function loadGH(){
  setStatus('loading','Connecting…');
  try{
    const r=await fetch(apiUrl(),{headers:hdrs()});
    if(r.status===404){data={};setStatus('ok','Connected — no data yet');renderSearch();renderAll();return;}
    if(r.status===401){setStatus('err','Bad token');return;}
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    data=JSON.parse(atob(j.content.replace(/\n/g,'')));
    setStatus('ok',cfg.user+'/'+cfg.repo);
    renderSearch();renderAll();
  }catch(e){setStatus('err',e.message);}
}

async function saveGH(){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  let sha=null;
  try{const r=await fetch(apiUrl(),{headers:hdrs()});if(r.ok){const j=await r.json();sha=j.sha;}}catch{}
  const body={message:'Update bid data',content};
  if(sha)body.sha=sha;
  const r=await fetch(apiUrl(),{method:'PUT',headers:hdrs(),body:JSON.stringify(body)});
  if(!r.ok)throw new Error('HTTP '+r.status);
}

function nav(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('on');
  const idx={lookup:0,enter:1,all:2,settings:3}[name];
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if(name==='all')renderAll();
  if(name==='lookup'){showSearch();}
}

function showSearch(){
  document.getElementById('view-search').style.display='block';
  document.getElementById('view-detail').style.display='none';
  renderSearch();
}

function showDetail(mk){
  const plane=data[mk];
  if(!plane)return;
  document.getElementById('view-search').style.display='none';
  const det=document.getElementById('view-detail');
  det.style.display='block';

  const jobs=plane.jobs||[];
  const allParts=[...new Set(jobs.flatMap(j=>(j.parts||[]).map(p=>p.name)))];
  const latest=jobs.slice().sort((a,b)=>b.date.localeCompare(a.date))[0];

  const partHTML=allParts.map(pn=>{
    const entries=jobs.flatMap(j=>{
      const m=(j.parts||[]).find(p=>p.name===pn);
      if(!m)return[];
      return[{date:j.date,tail:j.tail,rate:m.rateOverride||j.laborRate,hours:m.hours,mats:m.materials,notes:j.notes}];
    }).sort((a,b)=>b.date.localeCompare(a.date));
    if(!entries.length)return'';
    const e=entries[0];
    const matTotal=(e.mats||[]).reduce((s,m)=>s+m.qty*m.unitCost,0);
    const laborCost=e.rate?e.hours*e.rate:null;
    const rows=(e.mats||[]).map(m=>`<tr><td>${m.name}</td><td>${m.qty} ${m.unit}</td><td>$${m.unitCost.toFixed(2)}</td><td>$${(m.qty*m.unitCost).toFixed(2)}</td></tr>`).join('');
    return`<div class="part-section">
      <div class="part-title-bar"><h3>${pn}</h3><span>${e.hours} hrs · ${(e.mats||[]).length} materials · ${e.date}</span></div>
      <div class="part-content">
        ${e.notes?`<div class="warn">⚠ ${e.notes}</div>`:''}
        <table><thead><tr><th>Material</th><th>Qty</th><th>Unit Cost</th><th>Line Total</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="4" style="color:#555">No materials recorded</td></tr>'}</tbody></table>
        <div class="totals">
          <div class="tot"><div class="lbl">Labor Hours</div><div class="val">${e.hours}</div></div>
          ${e.rate?`<div class="tot"><div class="lbl">Rate</div><div class="val">$${e.rate}/hr</div></div><div class="tot"><div class="lbl">Labor Cost</div><div class="val">$${(e.hours*e.rate).toFixed(2)}</div></div>`:''}
          <div class="tot"><div class="lbl">Materials</div><div class="val">$${matTotal.toFixed(2)}</div></div>
          ${laborCost!==null?`<div class="tot"><div class="lbl">Part Total</div><div class="val gold">$${(laborCost+matTotal).toFixed(2)}</div></div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  det.innerHTML=`
    <button class="back-btn" onclick="showSearch()">← Back</button>
    <h1>${plane.model}</h1>
    <div class="sub" style="margin-bottom:20px;">Interior jobs on record · Tail: ${latest?.tail||'—'}</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Jobs</div><div class="metric-value">${jobs.length}</div></div>
      <div class="metric"><div class="metric-label">Parts</div><div class="metric-value">${allParts.length}</div></div>
      <div class="metric"><div class="metric-label">Latest</div><div class="metric-value" style="font-size:15px;">${latest?.date||'—'}</div></div>
    </div>
    ${partHTML||'<div class="empty">No parts recorded.</div>'}
    <div class="btn-row" style="margin-top:20px;">
      <button class="btn btn-red" onclick="deletePlane('${mk}')">Delete Plane</button>
    </div>`;
}

function renderSearch(){
  const q=(document.getElementById('lu-q')||{}).value?.toLowerCase().trim()||'';
  const planes=Object.values(data);
  const res=document.getElementById('search-results');
  if(!res)return;
  if(!planes.length){res.innerHTML='<div class="empty">No data yet — enter a past bid to get started.</div>';return;}
  const filtered=q?planes.filter(p=>p.model.toLowerCase().includes(q)||(p.jobs||[]).some(j=>(j.parts||[]).some(pt=>pt.name.toLowerCase().includes(q)))):planes;
  if(!filtered.length){res.innerHTML='<div class="empty">No matches found.</div>';return;}
  res.innerHTML='<div class="plane-grid">'+filtered.map(p=>{
    const jobs=p.jobs||[];
    const parts=[...new Set(jobs.flatMap(j=>(j.parts||[]).map(pt=>pt.name)))];
    const mk=mkey(p.model);
    return`<div class="pcard" onclick="showDetail('${mk}')">
      <div class="pcard-title">${p.model}</div>
      <div class="pcard-sub">${jobs.length} job${jobs.length!==1?'s':''} · ${parts.length} part${parts.length!==1?'s':''}</div>
      <div class="chips">${parts.slice(0,5).map(n=>`<span class="chip">${n}</span>`).join('')}${parts.length>5?`<span class="chip">+${parts.length-5}</span>`:''}</div>
    </div>`;
  }).join('')+'</div>';
}

function renderAll(){
  const planes=Object.values(data);
  const el=document.getElementById('all-list');
  if(!el)return;
  if(!planes.length){el.innerHTML='<div class="empty">No planes yet.</div>';return;}
  el.innerHTML='<div class="plane-grid">'+planes.map(p=>{
    const parts=[...new Set((p.jobs||[]).flatMap(j=>(j.parts||[]).map(pt=>pt.name)))];
    const mk=mkey(p.model);
    return`<div class="pcard" onclick="nav('lookup');setTimeout(()=>showDetail('${mk}'),50)">
      <div class="pcard-title">${p.model}</div>
      <div class="pcard-sub">${(p.jobs||[]).length} job${(p.jobs||[]).length!==1?'s':''}</div>
      <div class="chips">${parts.map(n=>`<span class="chip">${n}</span>`).join('')}</div>
    </div>`;
  }).join('')+'</div>';
}

function saveSettings(){
  cfg.user=document.getElementById('s-user').value.trim();
  cfg.repo=document.getElementById('s-repo').value.trim();
  cfg.token=document.getElementById('s-token').value.trim();
  if(!cfg.user||!cfg.repo||!cfg.token){alert('All fields required.');return;}
  sc(cfg);loadGH();
}

const MATS={
  'Seats':'Leather / fabric,Foam,Piping / welt cord,Thread,Velcro,Adhesive',
  'Divan':'Leather / fabric,Foam,Piping / welt cord,Thread,Velcro,Adhesive,Plywood substrate',
  'Headliner':'Headliner fabric,Foam backing,Spray adhesive,Velcro,Trim strips',
  'Side Panels':'Leather / vinyl,Foam,Adhesive,Velcro,Trim strips,Fasteners',
  'Closet':'Leather / vinyl,Plywood substrate,Hinges,Latches,Adhesive,Fasteners',
  'Carpet':'Carpet,Adhesive / carpet tape,Edge binding,Velcro',
  'Bulkhead':'Leather / vinyl,Foam,Plywood substrate,Adhesive,Fasteners,Trim strips',
  'Galley':'Leather / vinyl,Plywood substrate,Hinges,Latches,Fasteners,Adhesive',
  'Window Reveals':'Leather / vinyl,Foam,Adhesive,Velcro',
  'Armrests':'Leather / fabric,Foam,Adhesive,Thread,Velcro',
  'Cabinet':'Plywood substrate,Leather / vinyl,Hinges,Latches,Fasteners,Adhesive',
  'Lavatory':'Leather / vinyl,Foam,Adhesive,Fasteners,Trim strips',
  'Floor Panels':'Carpet,Plywood substrate,Adhesive,Fasteners,Edge binding',
  'Crew Seat':'Leather / fabric,Foam,Piping / welt cord,Thread,Velcro,Adhesive',
};

function quickAdd(sel){
  const v=sel.value;sel.value='';
  if(!v)return;
  const n=v==='Custom…'?prompt('Part name:'):v;
  if(n)addPart(n);
}

function addPart(name){
  pc++;
  const id='pe-'+pc;
  const div=document.createElement('div');
  div.className='part-entry';div.id=id;
  const mats=(MATS[name]||'Material').split(',');
  const matRows=mats.map(m=>matRow(m)).join('');
  div.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <input class="pname" value="${name}" style="flex:1;margin-right:10px;font-weight:600;font-size:15px;"/>
      <button class="rm-btn" onclick="this.closest('.part-entry').remove()">✕</button>
    </div>
    <div class="frow" style="margin-bottom:10px;">
      <div class="field"><label>Labor Hours</label><input class="phours" type="number" placeholder="8"/></div>
      <div class="field"><label>Rate Override ($/hr)</label><input class="prate" type="number" placeholder="Leave blank = job rate"/></div>
    </div>
    <div class="mat-heads"><span>Material</span><span>Qty</span><span>Unit</span><span>$/Unit</span><span></span></div>
    <div class="mlist">${matRows}</div>
    <button class="add-mat" onclick="addMat('${id}')">+ Add Material</button>`;
  document.getElementById('parts-container').appendChild(div);
}

function matRow(name=''){
  return`<div class="mat-row-input">
    <input value="${name}" placeholder="Material"/>
    <input type="number" placeholder="0"/>
    <input placeholder="sq ft / ea…"/>
    <input type="number" placeholder="0.00" step="0.01"/>
    <button class="rm-btn" onclick="this.closest('.mat-row-input').remove()">✕</button>
  </div>`;
}

function addMat(id){
  document.querySelector('#'+id+' .mlist').insertAdjacentHTML('beforeend',matRow(''));
}

function clearForm(){
  ['e-model','e-tail','e-rate','e-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('e-date').value=today();
  document.getElementById('parts-container').innerHTML='';
  document.getElementById('save-msg').textContent='';
  pc=0;
}

async function saveJob(){
  const model=document.getElementById('e-model').value.trim();
  const date=document.getElementById('e-date').value;
  if(!model||!date){alert('Plane model and date are required.');return;}
  const parts=[];
  document.querySelectorAll('.part-entry').forEach(pe=>{
    const name=pe.querySelector('.pname').value.trim();if(!name)return;
    const hours=parseFloat(pe.querySelector('.phours').value)||0;
    const rateOv=parseFloat(pe.querySelector('.prate').value)||null;
    const mats=[];
    pe.querySelectorAll('.mat-row-input').forEach(me=>{
      const ins=me.querySelectorAll('input');
      const mn=ins[0].value.trim();if(!mn)return;
      mats.push({name:mn,qty:parseFloat(ins[1].value)||0,unit:ins[2].value.trim(),unitCost:parseFloat(ins[3].value)||0});
    });
    parts.push({name,hours,rateOverride:rateOv,materials:mats});
  });
  if(!parts.length){alert('Add at least one part.');return;}
  const mk=mkey(model);
  if(!data[mk])data[mk]={model,jobs:[]};
  data[mk].jobs.push({date,tail:document.getElementById('e-tail').value.trim(),laborRate:parseFloat(document.getElementById('e-rate').value)||null,notes:document.getElementById('e-notes').value.trim(),parts});
  const msg=document.getElementById('save-msg');
  msg.style.color='#e6a817';msg.textContent='Saving…';
  try{await saveGH();msg.style.color='#4caf7d';msg.textContent='Saved ✓';setTimeout(()=>msg.textContent='',3000);}
  catch(e){msg.style.color='#e05555';msg.textContent='Failed: '+e.message;}
}

async function deletePlane(mk){
  if(!confirm('Delete all data for this plane?'))return;
  delete data[mk];
  await saveGH();
  showSearch();
}

function mkey(m){return m.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');}
function today(){return new Date().toISOString().split('T')[0];}

(function init(){
  const s=lc();
  cfg={user:s.user||'JFree50',repo:s.repo||'Aircraft-Custom-Interiors-Bid-System',token:s.token||''};
  document.getElementById('e-date').value=today();
  document.getElementById('s-user').value=cfg.user;
  document.getElementById('s-repo').value=cfg.repo;
  document.getElementById('s-token').value=cfg.token;
  if(cfg.token)loadGH();
  else setStatus('err','No token — go to Settings');
})();
</script>
